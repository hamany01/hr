<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script>
      // Protect global.fetch from redefinition in iframe sandboxes
      if (typeof window !== 'undefined') {
        // Redefine window.fetch to support both get and set without throwing
        try {
          let currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return currentFetch;
            },
            set(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            let currentFetch = window.fetch;
            Object.defineProperty(Window.prototype, 'fetch', {
              get() {
                return currentFetch;
              },
              set(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          } catch (e2) {}
        }

        const shadow = {};
        const proxy = new Proxy(shadow, {
          set(target, prop, value) {
            if (prop === 'fetch') {
              target[prop] = value;
              return true;
            }
            try {
              if (prop in window) {
                try {
                  window[prop] = value;
                } catch (e) {}
              }
              target[prop] = value;
            } catch (e) {}
            return true;
          },
          get(target, prop) {
            if (prop === 'fetch') {
              return target[prop] || window.fetch;
            }
            if (prop === 'parent' || prop === 'top' || prop === 'frames' || prop === 'opener' || prop === 'window' || prop === 'self' || prop === 'global') {
              return proxy;
            }
            if (prop in target) {
              return target[prop];
            }
            return window[prop];
          }
        });
        window.global = proxy;
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بوابة التقديم على وظيفة أخصائي أمن وسلامة (HSE)</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      body {
        font-family: 'Cairo', sans-serif;
      }
    </style>
  </head>

</html>
